services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prepforge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prepforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prepforge}
      POSTGRES_DB: ${POSTGRES_DB:-prepforge}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prepforge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: prepforge-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prepforge-backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-prepforge}:${POSTGRES_PASSWORD:-prepforge}@postgres:5432/${POSTGRES_DB:-prepforge}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  redisdata:
