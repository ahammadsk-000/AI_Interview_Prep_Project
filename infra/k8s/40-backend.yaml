apiVersion: apps/v1
kind: Deployment
metadata:
  name: prepforge-backend
  namespace: prepforge
  labels: { app: prepforge-backend }
spec:
  replicas: 3
  selector:
    matchLabels: { app: prepforge-backend }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels: { app: prepforge-backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/REPO/backend:latest   # set by CD
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: prepforge-config }
            - secretRef: { name: prepforge-secrets }
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: prepforge-backend
  namespace: prepforge
spec:
  selector: { app: prepforge-backend }
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prepforge-worker
  namespace: prepforge
  labels: { app: prepforge-worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app: prepforge-worker }
  template:
    metadata:
      labels: { app: prepforge-worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/REPO/backend:latest   # set by CD
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef: { name: prepforge-config }
            - secretRef: { name: prepforge-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
