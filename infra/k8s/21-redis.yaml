apiVersion: apps/v1
kind: Deployment
metadata:
  name: prepforge-redis
  namespace: prepforge
spec:
  replicas: 1
  selector:
    matchLabels: { app: prepforge-redis }
  template:
    metadata:
      labels: { app: prepforge-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prepforge-redis
  namespace: prepforge
spec:
  selector: { app: prepforge-redis }
  ports:
    - port: 6379
      targetPort: 6379
