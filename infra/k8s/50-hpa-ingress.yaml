apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prepforge-backend
  namespace: prepforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prepforge-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prepforge
  namespace: prepforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["api.prepforge.example.com"]
      secretName: prepforge-tls
  rules:
    - host: api.prepforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prepforge-backend
                port:
                  number: 80
