{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "prepforge.fullname" . }}-migrate
  labels:
    {{- include "prepforge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "prepforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "prepforge.image" . }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef: { name: {{ include "prepforge.fullname" . }}-config }
            - secretRef: { name: {{ include "prepforge.fullname" . }}-secrets }
{{- end }}
